name: 🤖 Ghost Handler — Full Automation Engine

on:
  repository_dispatch:
    types: [factory-wakeup, ghost-morning, ghost-midday, ghost-evening]
  schedule:
    # Morning session  — 7:30 AM IST (2:00 AM UTC)
    - cron: '0 2 * * *'
    # Midday session   — 12:30 PM IST (7:00 AM UTC)
    - cron: '0 7 * * *'
    # Evening session  — 6:30 PM IST (1:00 PM UTC)
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      session:
        description: 'Session to run'
        required: false
        default: 'morning'
        type: choice
        options: [morning, midday, evening]

jobs:
  ghost-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      # ── Setup ──────────────────────────────────────────────────────────────
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install \
            google-genai \
            git+https://github.com/d60/twikit.git \
            requests \
            python-dotenv \
            mutagen \
            edge-tts \
            google-api-python-client \
            instagrapi \
            pillow

      # ── Determine Session ──────────────────────────────────────────────────
      - name: Determine Session
        id: session
        run: |
          # Determine session based on UTC hour
          HOUR=$(date -u +%H)
          if [ "${{ github.event.inputs.session }}" != "" ]; then
            SESSION="${{ github.event.inputs.session }}"
          elif [ "$HOUR" -ge 1 ] && [ "$HOUR" -lt 5 ]; then
            SESSION="morning"
          elif [ "$HOUR" -ge 6 ] && [ "$HOUR" -lt 10 ]; then
            SESSION="midday"
          elif [ "$HOUR" -ge 12 ] && [ "$HOUR" -lt 16 ]; then
            SESSION="evening"
          else
            SESSION="morning"
          fi
          echo "session=$SESSION" >> $GITHUB_OUTPUT
          echo "🕐 Running session: $SESSION"

      # ── Install Node + Remotion (for video rendering) ─────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Remotion
        working-directory: remotion-studio
        run: npm ci --prefer-offline || npm install

      # ── Run Ghost Brain ────────────────────────────────────────────────────
      - name: Run Ghost Handler Brain
        env:
          GHOST_SESSION: ${{ steps.session.outputs.session }}
          # Gemini
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          # X / Twitter cookie auth
          X_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
          X_CT0: ${{ secrets.X_CT0 }}
          # ElevenLabs TTS
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          # Video APIs
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          # Meta / Facebook / Instagram
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.META_USER_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
          # YouTube
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          # Telegram alerts
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Discord and CallMeBot alerts
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          CALLMEBOT_API_KEY: ${{ secrets.CALLMEBOT_API_KEY }}
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
        run: |
          # Run Ghost Handler as a module (requires __init__.py in ghost/)
          python -m ghost.brain

      # ── Report ─────────────────────────────────────────────────────────────
      - name: Session Summary
        if: always()
        run: |
          echo "✅ Ghost Handler session complete: ${{ steps.session.outputs.session }}"
          echo "📊 Check Telegram for full stats report"
