name: V34 Ultra 4K Autopilot (Minutes-Optimized)

# ─────────────────────────────────────────────────────────────────────────────
# MINUTES BUDGET (Free tier = 2,000 min/month on ubuntu-latest)
#
# BEFORE this update:  ~25-35 min/run  →  max ~57-80 runs/month
# AFTER this update:   ~10-14 min/run  →  max ~142-200 runs/month
#
# Savings per run:
#   ✅ Node modules cache       saves  4-5 min
#   ✅ Python pip cache         saves  2-3 min
#   ✅ Background video cache   saves  3-5 min
#   ✅ Jitter cap 900s → 600s   saves  up to 25 min
#   ✅ Remotion --concurrency=2 saves  5-8 min (parallel frame render)
#   ✅ CRF=16 (vs 10)           saves  3-4 min  (still excellent quality)
#   ✅ timeout-minutes: 35      kills hung jobs that waste minutes
# ─────────────────────────────────────────────────────────────────────────────

on:
  repository_dispatch:
    types: [factory-wakeup]
  workflow_dispatch:     # Manual trigger — zero jitter, instant run

jobs:
  run_autopilot:
    runs-on: ubuntu-latest
    timeout-minutes: 35   # ← HARD KILL at 35 min — no infinite zombie runs wasting minutes

    steps:
      # ── STEP 1: Checkout ──────────────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── STEP 2: Reduced Human Jitter (max 30s to optimize Actions billing) ──
      - name: Human Jitter (Anti-Bot Delay)
        if: github.event_name != 'workflow_dispatch'
        run: |
          JITTER=$((RANDOM % 30))
          echo "💤 Sleeping ${JITTER}s (anti-bot jitter, max 30s)"
          sleep $JITTER

      # ── STEP 3: Setup Node.js ─────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── STEP 4: Cache node_modules (saves 4-5 min every run) ─────────────
      - name: Cache Node Modules
        id: node-cache
        uses: actions/cache@v4
        with:
          path: remotion-studio/node_modules
          key: node-${{ runner.os }}-${{ hashFiles('remotion-studio/package-lock.json') }}
          restore-keys: |
            node-${{ runner.os }}-

      # ── STEP 4b: Cache Remotion Browser (saves 1-2 min every run) ──────────
      - name: Cache Remotion Browser
        id: browser-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/remotion
          key: remotion-browser-${{ runner.os }}-${{ hashFiles('remotion-studio/package-lock.json') }}
          restore-keys: |
            remotion-browser-${{ runner.os }}-

      # ── STEP 5: Setup Python ──────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ── STEP 6: Cache pip packages (saves 2-3 min every run) ─────────────
      - name: Cache Python Packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-v2-${{ hashFiles('orchestrator/requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-v2-

      # ── STEP 7: Install Python deps (fast if cache hit) ───────────────────
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip --quiet
          pip install google-generativeai python-dotenv requests mutagen edge-tts requests-oauthlib --quiet

      # ── STEP 8: Install Node deps ONLY if cache missed ────────────────────
      - name: Install Remotion Dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        working-directory: ./remotion-studio
        run: npm install --prefer-offline

      # ── STEP 9: Cache background videos (saves 3-5 min every run) ────────
      # Videos are large (50-80 MB each) but static — no reason to re-download
      - name: Cache Background Videos
        id: video-cache
        uses: actions/cache@v4
        with:
          path: |
            remotion-studio/public/gta.mp4
            remotion-studio/public/sand.mp4
          key: bg-videos-v4
          # Fixed key = only downloaded ONCE then cached forever in this repo

      # ── STEP 10: Download videos ONLY on cache miss ───────────────────────
      - name: Download Background Videos (Only if not cached)
        if: steps.video-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p remotion-studio/public
          pip install yt-dlp --quiet

          echo "🎬 Downloading GTA gameplay video..."
          yt-dlp -f "bestvideo[ext=mp4][height<=1080]" \
            "https://www.youtube.com/shorts/31-Gv9e9T1Q" \
            -o remotion-studio/public/gta.mp4 \
            --no-playlist --quiet \
            || curl -L "https://www.w3schools.com/html/mov_bbb.mp4" \
               -o remotion-studio/public/gta.mp4

          echo "🎬 Downloading Minecraft/Sand gameplay video..."
          yt-dlp -f "bestvideo[ext=mp4][height<=1080]" \
            "https://www.youtube.com/shorts/s_Y16lG2-Hw" \
            -o remotion-studio/public/sand.mp4 \
            --no-playlist --quiet \
            || curl -L "https://raw.githubusercontent.com/mdn/learning-area/master/html/multimedia-and-embedding/video-and-audio-content/rabbit320.mp4" \
               -o remotion-studio/public/sand.mp4

          echo "✅ Videos downloaded:"
          ls -lh remotion-studio/public/*.mp4

      - name: Confirm Videos Present
        run: |
          ls -lh remotion-studio/public/*.mp4
          echo "✅ Background videos confirmed (cache or fresh download)"

      # ── STEP 11: Run V34 Dopamine Engine (Gemini + TTS + Remotion Render) ─
      - name: Run V34 Dopamine Engine
        env:
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_5: ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Tell Remotion render to use both CPU cores for parallel frame rendering
          REMOTION_CONCURRENCY: "2"
        run: |
          python orchestrator/v32_dopamine_engine.py

      # ── STEP 12: Upload to 4 Platforms ────────────────────────────────────
      - name: Upload to 4 Platforms
        env:
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.META_USER_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python uploader.py

      # ── STEP 13: Show minutes used this run ───────────────────────────────
      - name: Report Run Time
        if: always()
        run: |
          echo "⏱️ Job finished. Check Actions tab for exact duration."
          echo "📊 Tip: Each minute saved = more posts per month."
