name: V34 Ultra 4K Autopilot

on:
  repository_dispatch:
    types: [factory-wakeup]
  workflow_dispatch: # Allows manual trigger - NO jitter, runs instantly

jobs:
  run_autopilot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Human Jitter (Anti-Bot Delay)
        if: github.event_name != 'workflow_dispatch'
        run: |
          JITTER=$((RANDOM % 2700))
          echo "Sleeping for $JITTER seconds to mimic human behavior..."
          sleep $JITTER

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai python-dotenv requests mutagen edge-tts requests-oauthlib

      - name: Install Remotion Dependencies
        working-directory: ./remotion-studio
        run: npm install

      - name: Download Background Videos (Free Stock)
        run: |
          mkdir -p remotion-studio/public
          pip install yt-dlp
          echo "Downloading background video 1 (GTA)..."
          yt-dlp -f "bestvideo[ext=mp4][height<=1080]" "https://www.youtube.com/shorts/31-Gv9e9T1Q" -o remotion-studio/public/gta.mp4 || curl -L "https://www.w3schools.com/html/mov_bbb.mp4" -o remotion-studio/public/gta.mp4
          echo "Downloading background video 2 (Minecraft)..."
          yt-dlp -f "bestvideo[ext=mp4][height<=1080]" "https://www.youtube.com/shorts/s_Y16lG2-Hw" -o remotion-studio/public/sand.mp4 || curl -L "https://raw.githubusercontent.com/mdn/learning-area/master/html/multimedia-and-embedding/video-and-audio-content/rabbit320.mp4" -o remotion-studio/public/sand.mp4
          echo "✅ Videos downloaded:"
          ls -lh remotion-studio/public/*.mp4

      - name: Run V32 Dopamine Engine (Render)
        env:
          # Mapped to your existing GitHub secret names
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_5: ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python orchestrator/v32_dopamine_engine.py

      - name: Upload to 4 Platforms
        env:
          # Mapped to your existing GitHub secret names
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.META_USER_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python uploader.py
