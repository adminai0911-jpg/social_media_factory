name: AI Cinematic Factory

on:
  schedule:
    # Triggers at the START of the jitter windows: 8:30 AM, 1:30 PM, 7:30 PM IST.
    # The Python script will then randomly delay the post by up to 60+ minutes.
    # ANTI-BAN WARMUP PHASE: Post only 1 time a day (1:30 PM IST)
    - cron: '0 8 * * *'
    
    # AFTER 7 DAYS, DELETE THE LINE ABOVE AND UNCOMMENT THE LINE BELOW (3x a day)
    # - cron: '0 3,8,14 * * *'
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  build_and_publish:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install System Dependencies (ffmpeg & fonts)
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg fonts-liberation fonts-noto fonts-freefont-ttf

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Execute Social Media Factory Pipeline
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        CLOUDINARY_URL: ${{ secrets.CLOUDINARY_URL }}
        META_USER_ACCESS_TOKEN: ${{ secrets.META_USER_ACCESS_TOKEN }}
        INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
      run: |
        python main.py
