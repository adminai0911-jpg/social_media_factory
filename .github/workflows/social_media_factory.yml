name: AI Social Media Wealth Factory — Phase 12

on:
  schedule:
    # Triggers at the START of the jitter windows: 8:30 AM, 1:30 PM, 7:30 PM IST.
    # The Python script will then randomly delay the post by up to 60+ minutes.
    # FULL SPEED: 3x per day — 8:30 AM, 2:00 PM, 8:00 PM IST
    # Account is 20+ days old. Warmup complete. Maximum reach mode.
    - cron: '0 3,8,14 * * *'
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  build_and_publish:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install System Dependencies (ffmpeg & fonts)
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg fonts-liberation fonts-noto fonts-freefont-ttf

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Build B-Roll Library (First-Time Only)
      env:
        PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      run: |
        python -c "from studio.build_broll_library import build_library; build_library()"

    - name: Execute Social Media Factory Pipeline
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        CLOUDINARY_URL: ${{ secrets.CLOUDINARY_URL }}
        META_USER_ACCESS_TOKEN: ${{ secrets.META_USER_ACCESS_TOKEN }}
        INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
        YOUTUBE_CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
        FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
        FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
      run: |
        python main.py
