# ============================================================
# Workflow 1: PC GENERATOR (Self-Hosted Runner)
# ============================================================
# Runs on YOUR OWN PC — 100% FREE, unlimited minutes.
# Schedule:
#   Mon-Fri  → every 30 min between 9:00 AM – 7:00 PM IST (3:30–13:30 UTC)
#   Saturday → every 30 min between 9:00 AM – 3:00 PM IST (3:30–9:30 UTC)
#   Sunday   → OFF (no cron triggers)
#
# Logic: Check if buffer has < 15 videos. If yes, render one more.
# ============================================================

name: "1 — PC Generator (Self-Hosted)"

on:
  schedule:
    # Mon-Fri  9:00 AM - 7:00 PM IST = 3:30 - 13:30 UTC, every 30 minutes
    - cron: "30 3 * * 1-5"
    - cron: "0 4 * * 1-5"
    - cron: "30 4 * * 1-5"
    - cron: "0 5 * * 1-5"
    - cron: "30 5 * * 1-5"
    - cron: "0 6 * * 1-5"
    - cron: "30 6 * * 1-5"
    - cron: "0 7 * * 1-5"
    - cron: "30 7 * * 1-5"
    - cron: "0 8 * * 1-5"
    - cron: "30 8 * * 1-5"
    - cron: "0 9 * * 1-5"
    - cron: "30 9 * * 1-5"
    - cron: "0 10 * * 1-5"
    - cron: "30 10 * * 1-5"
    - cron: "0 11 * * 1-5"
    - cron: "30 11 * * 1-5"
    - cron: "0 12 * * 1-5"
    - cron: "30 12 * * 1-5"
    - cron: "0 13 * * 1-5"
    - cron: "30 13 * * 1-5"
    # Saturday  9:00 AM - 3:00 PM IST = 3:30 - 9:30 UTC
    - cron: "30 3 * * 6"
    - cron: "0 4 * * 6"
    - cron: "30 4 * * 6"
    - cron: "0 5 * * 6"
    - cron: "30 5 * * 6"
    - cron: "0 6 * * 6"
    - cron: "30 6 * * 6"
    - cron: "0 7 * * 6"
    - cron: "30 7 * * 6"
    - cron: "0 8 * * 6"
    - cron: "30 8 * * 6"
    - cron: "0 9 * * 6"

  workflow_dispatch:
    inputs:
      force_generate:
        description: "Force generate even if buffer >= 15"
        required: false
        default: "false"

jobs:
  check-and-generate:
    # ⚠️ CRITICAL: This runs on YOUR PC, not GitHub's cloud
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install -r orchestrator/requirements.txt
          pip install -U yt-dlp

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: remotion-studio/package-lock.json

      - name: Install Remotion dependencies
        run: npm ci
        working-directory: remotion-studio

      - name: Check buffer size
        id: buffer_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'EOF'
          import subprocess, json, sys

          try:
              result = subprocess.run(
                  ["gh", "release", "view", "buffer_queue", "--json", "assets"],
                  capture_output=True, text=True
              )
              if result.returncode != 0:
                  print("BUFFER_COUNT=0")
                  with open("$GITHUB_OUTPUT", "a") as f:
                      f.write("buffer_count=0\n")
                      f.write("should_generate=true\n")
                  sys.exit(0)
              
              data = json.loads(result.stdout)
              mp4_count = len([a for a in data.get("assets", []) if a["name"].endswith(".mp4")])
              print(f"Buffer has {mp4_count} video(s)")
              
              import os
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write(f"buffer_count={mp4_count}\n")
                  should = "true" if mp4_count < 15 else "false"
                  f.write(f"should_generate={should}\n")
          except Exception as e:
              print(f"Check failed (assuming empty): {e}")
              import os
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("buffer_count=0\n")
                  f.write("should_generate=true\n")
          EOF

      - name: Generate video and upload to buffer
        if: steps.buffer_check.outputs.should_generate == 'true' || github.event.inputs.force_generate == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
          GEMINI_API_KEY_5: ${{ secrets.GEMINI_API_KEY_5 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          REMOTION_CONCURRENCY: "4"
        run: |
          echo "Buffer count: ${{ steps.buffer_check.outputs.buffer_count }}. Generating new video..."
          python orchestrator/generate_video.py

      - name: Skip — buffer is already full
        if: steps.buffer_check.outputs.should_generate == 'false' && github.event.inputs.force_generate != 'true'
        run: |
          echo "✅ Buffer already has ${{ steps.buffer_check.outputs.buffer_count }} videos (≥ 15). Skipping generation."
